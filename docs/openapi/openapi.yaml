openapi: 3.0.3
info:
  title: PantryPal API
  description: |
    REST API for PantryPal — Smart Kitchen Inventory Management.
    
    ## Authentication
    Most endpoints require a valid JWT access token passed as a Bearer token
    in the Authorization header. Obtain tokens via `/auth/register` or `/auth/login`.
    
    ## Response Format
    All responses follow a consistent envelope:
    - Success: `{ "success": true, "data": {...}, "meta": {...} }`
    - Error: `{ "success": false, "error": { "code": "...", "message": "..." } }`
  version: 1.0.0
  contact:
    name: PantryPal
servers:
  - url: http://localhost:4000/api/v1
    description: Local development server

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Authentication and session management
  - name: Pantry
    description: Pantry inventory management
  - name: Recipes
    description: Recipe browsing and suggestion engine
  - name: Shopping Lists
    description: Shopping list management
  - name: Analytics
    description: Inventory usage analytics
  - name: Notifications
    description: In-app expiry notifications
  - name: Admin
    description: Admin-only endpoints (role=ADMIN required)

paths:

  # ─── AUTH ──────────────────────────────────────────────────────────

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: alice@example.com
              password: "securePassword123"
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh the access token using the refresh token cookie
      security: []
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out and clear refresh token cookie
      responses:
        '204':
          description: Logged out successfully

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user profile
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── PANTRY ──────────────────────────────────────────────────────────

  /pantry:
    get:
      tags: [Pantry]
      summary: Get all pantry items for the authenticated user
      parameters:
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category ID
        - name: status
          in: query
          schema:
            type: string
            enum: [FRESH, EXPIRING_SOON, EXPIRED]
          description: Filter by expiry status
        - name: search
          in: query
          schema:
            type: string
          description: Full-text search by item name
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [name, expiryDate, addedAt, quantity]
            default: addedAt
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paginated list of pantry items
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PantryItem'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Pantry]
      summary: Add a new item to the pantry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePantryItemRequest'
            example:
              name: "Whole Milk"
              quantity: 1
              unit: "l"
              categoryId: "cat_dairy_uuid"
              expiryDate: "2025-04-20"
              notes: "Organic"
      responses:
        '201':
          description: Pantry item created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PantryItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /pantry/{id}:
    get:
      tags: [Pantry]
      summary: Get a specific pantry item by ID
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Pantry item found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PantryItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Pantry]
      summary: Update a pantry item
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePantryItemRequest'
      responses:
        '200':
          description: Pantry item updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PantryItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

    delete:
      tags: [Pantry]
      summary: Delete a pantry item
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Pantry item deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── RECIPES ──────────────────────────────────────────────────────────

  /recipes:
    get:
      tags: [Recipes]
      summary: Get all recipes (optionally matched to current pantry)
      parameters:
        - name: matchPantry
          in: query
          schema:
            type: boolean
            default: false
          description: If true, sorts results by match score against user's pantry
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: List of recipes, optionally ranked by pantry match
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/RecipeWithMatch'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /recipes/{id}:
    get:
      tags: [Recipes]
      summary: Get full recipe details including ingredients
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Recipe detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RecipeDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── SHOPPING LISTS ──────────────────────────────────────────────────

  /shopping-lists:
    get:
      tags: [Shopping Lists]
      summary: Get all shopping lists for the current user
      responses:
        '200':
          description: List of shopping lists
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ShoppingList'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Shopping Lists]
      summary: Create a new shopping list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: "Weekly Shopping"
                recipeIds:
                  type: array
                  items:
                    type: string
                  description: Optional — auto-populate with missing ingredients for these recipes
      responses:
        '201':
          description: Shopping list created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ShoppingList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /shopping-lists/{id}:
    get:
      tags: [Shopping Lists]
      summary: Get a shopping list with all its items
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Shopping list with items
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ShoppingListDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Shopping Lists]
      summary: Delete a shopping list
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Shopping list deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /shopping-lists/{id}/items/{itemId}:
    patch:
      tags: [Shopping Lists]
      summary: Update a shopping list item (e.g., mark as purchased)
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - name: itemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                isPurchased:
                  type: boolean
                quantity:
                  type: number
      responses:
        '200':
          description: Item updated
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── ANALYTICS ──────────────────────────────────────────────────────────

  /analytics/summary:
    get:
      tags: [Analytics]
      summary: Get inventory usage summary for the dashboard
      responses:
        '200':
          description: Analytics summary
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AnalyticsSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── NOTIFICATIONS ──────────────────────────────────────────────────────────

  /notifications:
    get:
      tags: [Notifications]
      summary: Get all notifications for the current user
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: List of notifications
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Notification'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: Mark a notification as read
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Notification marked as read
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /notifications/read-all:
    patch:
      tags: [Notifications]
      summary: Mark all notifications as read
      responses:
        '204':
          description: All notifications marked as read
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── ADMIN ──────────────────────────────────────────────────────────

  /admin/categories:
    get:
      tags: [Admin]
      summary: List all categories (also available to regular users)
      security: []
      responses:
        '200':
          description: Category list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Category'

    post:
      tags: [Admin]
      summary: Create a new ingredient category (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                icon:
                  type: string
      responses:
        '201':
          description: Category created
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

# ─── COMPONENTS ──────────────────────────────────────────────────────────

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Authentication required or token expired
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: Your session has expired. Please log in again.
              subCode: TOKEN_EXPIRED

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: FORBIDDEN
              message: You do not have permission to perform this action.

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: NOT_FOUND
              message: Pantry item not found.

    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
          example:
            success: false
            error:
              code: VALIDATION_ERROR
              message: Request body contains invalid data.
              details:
                - field: name
                  message: Name is required
                - field: quantity
                  message: Quantity must be a positive number

    Conflict:
      description: Business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: BUSINESS_RULE_VIOLATION
              message: An account with this email address already exists.
              subCode: DUPLICATE_EMAIL

  schemas:

    # ─── Envelopes ───

    SuccessEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        meta:
          type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            subCode:
              type: string

    ValidationErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    # ─── Domain Models ───

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [REGULAR_USER, ADMIN]
        createdAt:
          type: string
          format: date-time

    PantryItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        quantity:
          type: number
        unit:
          type: string
        category:
          $ref: '#/components/schemas/Category'
        expiryDate:
          type: string
          format: date
          nullable: true
        expiryStatus:
          type: string
          enum: [FRESH, EXPIRING_SOON, EXPIRED, NO_EXPIRY]
        addedAt:
          type: string
          format: date-time
        notes:
          type: string
          nullable: true

    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        icon:
          type: string
          nullable: true

    RecipeWithMatch:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        servings:
          type: integer
        prepTimeMinutes:
          type: integer
        matchScore:
          type: number
          description: Percentage (0-100) of required ingredients available in pantry
          nullable: true
        missingCount:
          type: integer
          description: Number of missing ingredients
          nullable: true

    RecipeDetail:
      allOf:
        - $ref: '#/components/schemas/RecipeWithMatch'
        - type: object
          properties:
            instructions:
              type: string
            ingredients:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  quantity:
                    type: number
                  unit:
                    type: string
                  availableInPantry:
                    type: boolean
                  pantryQuantity:
                    type: number
                    nullable: true

    ShoppingList:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        itemCount:
          type: integer
        purchasedCount:
          type: integer

    ShoppingListDetail:
      allOf:
        - $ref: '#/components/schemas/ShoppingList'
        - type: object
          properties:
            items:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  quantity:
                    type: number
                  unit:
                    type: string
                  isPurchased:
                    type: boolean
                  recipeId:
                    type: string
                    format: uuid
                    nullable: true

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [EXPIRY_WARNING, ITEM_EXPIRED]
        message:
          type: string
        isRead:
          type: boolean
        pantryItemId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time

    AnalyticsSummary:
      type: object
      properties:
        totalItems:
          type: integer
        expiringWithin3Days:
          type: integer
        expiredItems:
          type: integer
        categoryCounts:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              count:
                type: integer
        recentlyAdded:
          type: integer
          description: Items added in the last 7 days

    # ─── Request Bodies ───

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            accessToken:
              type: string
            user:
              $ref: '#/components/schemas/User'

    CreatePantryItemRequest:
      type: object
      required: [name, quantity, unit]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        quantity:
          type: number
          minimum: 0.01
        unit:
          type: string
          enum: [g, kg, ml, l, pcs, tbsp, tsp, cup, oz, lb]
        categoryId:
          type: string
          format: uuid
          nullable: true
        expiryDate:
          type: string
          format: date
          nullable: true
        notes:
          type: string
          maxLength: 500
          nullable: true

    UpdatePantryItemRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        quantity:
          type: number
          minimum: 0.01
        unit:
          type: string
        categoryId:
          type: string
          format: uuid
          nullable: true
        expiryDate:
          type: string
          format: date
          nullable: true
        notes:
          type: string
          nullable: true
